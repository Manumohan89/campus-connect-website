# ═══════════════════════════════════════════════════════
# Render.com deployment config — BACKEND ONLY
# Frontend is deployed separately on Vercel
# ═══════════════════════════════════════════════════════

services:
  - type: web
    name: campus-connect-api
    env: node
    region: singapore          # closest to India
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node app.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: campus-connect-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://campus-connect.online,https://www.campus-connect.online,https://campus-connect-website-1hu5.onrender.com
      - key: PORT
        value: 10000

databases:
  - name: campus-connect-db
    databaseName: campus_connect
    user: campusconnect
    region: singapore
    plan: free
      - key: EMAIL_USER
        sync: false   # Set in Render dashboard: your Gmail address
      - key: EMAIL_PASS
        sync: false   # Set in Render dashboard: Gmail App Password (not account password)
