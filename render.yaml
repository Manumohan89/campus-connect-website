services:
  - type: web
    name: campus-connect
    runtime: node
    buildCommand: |
      apt-get update -qq && apt-get install -y -qq python3 python3-pip nodejs gcc g++ default-jre default-jdk mono-complete || true
      pip3 install pdfplumber pandas openpyxl --quiet --break-system-packages || pip3 install pdfplumber pandas openpyxl --quiet
      cd frontend && npm install --legacy-peer-deps && npm run build
      cd ../backend && npm install
    startCommand: cd backend && node app.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: campus-connect-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://campus-connect.onrender.com

      # Email — fill these in Render dashboard
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false

      # Razorpay — fill in for payments (get free at razorpay.com)
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false

      - key: CLOUDINARY_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # AI Tutor (Anthropic Claude) — get free key at console.anthropic.com
      - key: ANTHROPIC_API_KEY
        sync: false

        sync: false
        value: https://judge0-ce.p.rapidapi.com

      # Push Notifications (VAPID) — generate with: npx web-push generate-vapid-keys
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false

databases:
  - name: campus-connect-db
    databaseName: campusconnect
    user: campusconnect
    plan: free
